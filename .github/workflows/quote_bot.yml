name: X Quote Bot

on:
  schedule:
    - cron: '*/15 * * * *'   # 15分ごとに実行（随時）
  workflow_dispatch:           # 手動実行も可能

jobs:
  quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: |
          pip install playwright feedparser
          playwright install chromium
          playwright install-deps chromium

      - name: last_seen.json / following.json をキャッシュから復元
        uses: actions/cache@v4
        with:
          path: |
            last_seen.json
            following.json
          key: bot-state-${{ github.run_id }}
          restore-keys: bot-state-

      - name: ボット実行
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: python bot.py

      - name: デバッグ画像をアーティファクトに保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_*.png
          if-no-files-found: ignore
